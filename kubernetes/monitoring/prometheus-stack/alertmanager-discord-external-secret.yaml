apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-config
  namespace: prometheus-stack
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: alertmanager-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # This is the full Alertmanager config (chart defaults from
        # kube-prometheus-stack, reproduced here) instead of the usual
        # alertmanagerSpec.secrets file-mount, because prometheus-operator
        # v0.90.1 doesn't recognize discord_configs.webhook_url_file
        # (https://github.com/prometheus-operator/prometheus-operator/issues/7159).
        # webhook_url is the older/plain field the operator's schema does
        # recognize, so the URL is templated in directly from 1Password
        # rather than committed to git.
        alertmanager.yaml: |
          global:
            resolve_timeout: 5m
          inhibit_rules:
            - source_matchers:
                - 'severity = critical'
              target_matchers:
                - 'severity =~ warning|info'
              equal:
                - 'namespace'
                - 'alertname'
            - source_matchers:
                - 'severity = warning'
              target_matchers:
                - 'severity = info'
              equal:
                - 'namespace'
                - 'alertname'
            - source_matchers:
                - 'alertname = InfoInhibitor'
              target_matchers:
                - 'severity = info'
              equal:
                - 'namespace'
            - target_matchers:
                - 'alertname = InfoInhibitor'
          route:
            group_by: ['namespace']
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 12h
            receiver: 'null'
            routes:
              - receiver: 'null'
                matchers:
                  - alertname = "Watchdog"
              - receiver: 'discord'
                matchers:
                  - severity =~ "critical|warning"
          receivers:
            - name: 'null'
            - name: 'discord'
              discord_configs:
                - webhook_url: '{{ .webhookURL }}'
          templates:
            - '/etc/alertmanager/config/*.tmpl'
  data:
    - secretKey: webhookURL
      remoteRef:
        key: discord/homelab_alerts_webhook
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
