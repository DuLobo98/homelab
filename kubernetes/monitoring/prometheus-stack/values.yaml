prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: 20GiB
    resources:
      requests:
        memory: 900Mi
        cpu: 100m
      limits:
        memory: 1536Mi
        cpu: 1000m
    affinity: &preferNonControlPlane
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: DoesNotExist
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 20Gi
    scrapeInterval: 30s
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector:
      matchLabels: &prometheusInstance
        prometheus: kube-prometheus-stack
    ruleSelectorNilUsesHelmValues: false
    ruleSelector:
      matchLabels: *prometheusInstance
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector:
      matchLabels: *prometheusInstance
    probeSelectorNilUsesHelmValues: false
    probeSelector:
      matchLabels: *prometheusInstance
    scrapeConfigSelectorNilUsesHelmValues: false
    scrapeConfigSelector:
      matchLabels: *prometheusInstance

alertmanager:
  alertmanagerSpec:
    retention: 72h
    resources:
      requests:
        memory: 200Mi
        cpu: 10m
      limits:
        memory: 512Mi
        cpu: 200m
    affinity: *preferNonControlPlane
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi
    secrets:
      - alertmanager-discord-credentials
  config:
    route:
      routes:
        - receiver: 'null'
          matchers:
            - alertname = "Watchdog"
        - receiver: 'discord'
          matchers:
            - severity =~ "critical|warning"
    receivers:
      - name: 'null'
      - name: 'discord'
        discord_configs:
          - webhook_url_file: /etc/alertmanager/secrets/alertmanager-discord-credentials/webhook-url

grafana:
  # Recreate avoids the RWO rollout deadlock
  deploymentStrategy:
    type: Recreate
  persistence:
    enabled: true
    storageClassName: longhorn
    size: 5Gi
    accessModes:
      - ReadWriteOnce
  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password
  ingress:
    enabled: false
  serviceMonitor:
    labels: *prometheusInstance
  resources:
    requests:
      memory: 256Mi
      cpu: 50m
    limits:
      memory: 512Mi
      cpu: 500m
  affinity: *preferNonControlPlane
  sidecar:
    resources:
      requests:
        memory: 96Mi
        cpu: 10m
      limits:
        memory: 192Mi
        cpu: 100m

commonLabels: *prometheusInstance

kube-state-metrics:
  prometheus:
    monitor:
      additionalLabels: *prometheusInstance
  resources:
    requests:
      memory: 64Mi
      cpu: 10m
    limits:
      memory: 192Mi
      cpu: 200m
  affinity: *preferNonControlPlane

prometheus-node-exporter:
  prometheus:
    monitor:
      additionalLabels: *prometheusInstance
      relabelings:
        - action: replace
          sourceLabels: [__meta_kubernetes_endpoint_node_name]
          targetLabel: instance
  resources:
    requests:
      memory: 32Mi
      cpu: 10m
    limits:
      memory: 96Mi
      cpu: 100m

prometheusOperator:
  resources:
    requests:
      memory: 64Mi
      cpu: 10m
    limits:
      memory: 192Mi
      cpu: 200m
  affinity: *preferNonControlPlane
  prometheusConfigReloader:
    resources:
      requests:
        memory: 20Mi
        cpu: 10m
      limits:
        memory: 64Mi
        cpu: 100m
