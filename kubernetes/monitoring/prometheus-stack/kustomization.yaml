apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# No top-level namespace transformer because it force-overrides the namespace on
# every resource, including the kube-prometheus-stack chart's exporter
# Services that are deliberately hardcoded to kube-system (coredns, kube-etcd,
# kube-controller-manager, kube-scheduler, kube-proxy)
resources:
  - namespace.yaml
  - grafana_ingress.yaml
  - prometheus_ingress.yaml
  - alertmanager_ingress.yaml
  - grafana-external-secret.yaml
  - proxmox-scrapeconfig.yaml
helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: 84.5.0
    releaseName: kube-prometheus-stack
    namespace: prometheus-stack
    valuesFile: values.yaml
    includeCRDs: true
configMapGenerator:
  - name: longhorn-grafana-dashboards
    namespace: prometheus-stack
    files:
      - dashboards/generated/longhorn/longhorn.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
