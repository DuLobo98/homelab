apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: prometheus-stack
resources:
  - namespace.yaml
  - grafana_ingress.yaml
  - prometheus_ingress.yaml
  - alertmanager_ingress.yaml
  - grafana-external-secret.yaml
helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: 84.5.0
    releaseName: kube-prometheus-stack
    namespace: prometheus-stack
    valuesFile: values.yaml
    includeCRDs: true
configMapGenerator:
  - name: longhorn-grafana-dashboards
    files:
      - dashboards/generated/longhorn/longhorn.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
patches:
  - target:
      kind: Service
      name: kube-prometheus-stack-(coredns|kube-etcd|kube-controller-manager|kube-scheduler|kube-proxy)
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: kube-system
