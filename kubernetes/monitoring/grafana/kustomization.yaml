apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
resources:
  - namespace.yaml
  - credentials-external-secret.yaml
helmCharts:
  - name: grafana
    repo: https://grafana-community.github.io/helm-charts
    version: 11.2.2
    releaseName: grafana
    namespace: monitoring
    valuesFile: values.yaml
