
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: grafana-admin-credentials
    creationPolicy: Owner
  data:
    - secretKey: grafana-user
      remoteRef:
        key: grafana/user
    - secretKey: grafana-password
      remoteRef:
        key: grafana/password