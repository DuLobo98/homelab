server:
  ingress:
    enabled: false # Ingress is managed via Traefik IngressRoute
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  extraArgs:
    - --insecure # Disable TLS because we're using Ingress with TLS termination
  
applicationSet:
  enabled: true
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

controller:
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

repoServer:
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# External authentication
dex:
  enabled: false

metrics:
  enabled: true
  serviceMonitor:
    enabled: true

notifications:
  enabled: true
  secret:
    create: true

configs:
  cm:
    kustomize.buildOptions: "--enable-helm"
