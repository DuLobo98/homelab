apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: backup-daily
  namespace: longhorn-system
spec:
  concurrency: 1
  cron: 0 1 * * *
  groups:
    - daily
    - default
  labels:
    backup: full
    critical: "false"
    schedule: daily
  name: backup-daily
  parameters:
    full-backup-interval: "7"
  retain: 14
  task: backup
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: backup-daily-critical
  namespace: longhorn-system
spec:
  concurrency: 1
  cron: 0 0 * * *
  groups:
    - critical
  labels:
    backup: full
    critical: "true"
    schedule: daily
  name: backup-daily-critical
  parameters:
    full-backup-interval: "1"
  retain: 14
  task: backup-force-create
---
