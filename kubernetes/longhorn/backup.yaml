  namespace: longhorn-system
spec:
  concurrency: 1
  cron: 0 */2 * * *
  groups:
    - critical
  labels:
    backup: cleanup
    critical: "true"
    schedule: 2h
  name: snapshot-cleanup-critical
  parameters: {}
  retain: 0
  task: snapshot-cleanup
---
