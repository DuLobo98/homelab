apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: n8n
resources:
  - namespace.yaml
  - ingress.yaml
  - external-secret.yaml
helmCharts:
  - name: n8n
    repo: https://community-charts.github.io/helm-charts
    version: "1.24.0"
    releaseName: n8n
    namespace: n8n
    valuesFile: values.yaml
    includeCRDs: false
