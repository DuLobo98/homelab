version: "3"

tasks:
  default:
    desc: List all available tasks
    silent: true
    cmds:
      - task --list

  op:generate:
    desc: Generate all 1Password templates.
    silent: true
    preconditions:
      - sh: command -v op >/dev/null 2>&1
        msg: "1Password CLI (op) is required to inject secrets"
    cmds:
      - |
        set -euo pipefail
        templates=$(find . -name '*.tpl')
        if [ -z "$templates" ]; then
          echo "No 1Password templates found under ." >&2
          exit 0
        fi
        for template in $templates; do
          output="${template%.tpl}"
          op inject -i "$template" -o "$output" -f
          echo "Injected $template → $output"
        done

  k3s:bootstrap:
    desc: Bootstrap k3s cluster with 1 control plane and 2 workers
    silent: true
    cmds:
      - |
        set -euo pipefail
        
        CONTROL_PLANE_IP="192.168.1.200"
        WORKER_01_IP="192.168.1.201"
        WORKER_02_IP="192.168.1.202"
        SSH_USER="ltwadmin"

        echo "Installing k3s on control plane (${CONTROL_PLANE_IP})..."
        ssh.exe ${SSH_USER}@${CONTROL_PLANE_IP} "curl -sfL https://get.k3s.io | sh -"
        
        echo "Retrieving node token..."
        K3S_TOKEN=$(ssh.exe ${SSH_USER}@${CONTROL_PLANE_IP} "sudo cat /var/lib/rancher/k3s/server/node-token")
        
        echo "Joining worker 01 (${WORKER_01_IP}) to cluster..."
        ssh.exe ${SSH_USER}@${WORKER_01_IP} "curl -sfL https://get.k3s.io | K3S_URL=https://${CONTROL_PLANE_IP}:6443 K3S_TOKEN=${K3S_TOKEN} sh -"
        
        echo "Joining worker 02 (${WORKER_02_IP}) to cluster..."
        ssh.exe ${SSH_USER}@${WORKER_02_IP} "curl -sfL https://get.k3s.io | K3S_URL=https://${CONTROL_PLANE_IP}:6443 K3S_TOKEN=${K3S_TOKEN} sh -"
        
        echo "Copying kubeconfig..."
        ssh.exe ${SSH_USER}@${CONTROL_PLANE_IP} "sudo cat /etc/rancher/k3s/k3s.yaml" | sed "s/127.0.0.1/${CONTROL_PLANE_IP}/g" > ~/.kube/config-k3s
        export KUBECONFIG=~/.kube/config-k3s
        
        echo "Removing default storage class to prevent conflicts with Longhorn..."
        kubectl patch storageclass local-path -p '{"metadata": {"annotations":{"storageclass.kubernetes.io/is-default-class":"false"}}}'
        
        echo "k3s cluster bootstrapped successfully!"

  k8s:bootstrap:
    desc: Bootstrap Kubernetes cluster.
    silent: true
    cmds:
      - |
        set -euo pipefail

        echo "Configuring 1Password token secret for External Secrets Operator..."
        export OP_TOKEN=$(op read "op://homelab/1password/sa_token")
        kubectl create -f kubernetes/external-secrets/namespace.yaml
        kubectl create secret generic onepassword-token \
          --namespace external-secrets \
          --from-literal=token="$OP_TOKEN"
        echo "Configuring 1Password token secret completed."

        echo "Bootstrapping ArgoCD..."
        kustomize build kubernetes/argocd --enable-helm | kubectl apply -f -
        echo "Waiting for ArgoCD to be ready..."
        kubectl wait --for=condition=available deployment/argocd-server -n argocd --timeout=120s
        echo "Waiting for ArgoCD initial admin secret..."
        kubectl wait --for=create secret/argocd-initial-admin-secret -n argocd --timeout=120s
        echo "ArgoCD bootstrapped successfully!"
        echo "The password for the 'admin' user is:"
        kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d
        echo "Bootstrap ArgoCD completed."
        
  k8s:teardown:
    desc: Teardown Kubernetes cluster.
    silent: true
    cmds:
      - |
        set -euo pipefail
        
        echo "Teardown ArgoCD..."
        # Remove finalizers from Applications to prevent namespace from getting stuck
        kubectl get applications -n argocd -o json | jq -r '.items[].metadata.name' | while read app; do
          kubectl patch application "$app" -n argocd -p '{"metadata":{"finalizers":null}}' --type=merge
        done
        # Delete all resources using kustomize
        kustomize build kubernetes/argocd --enable-helm | kubectl delete -f -
        echo "ArgoCD teardown completed!"
