services:
  bind9:
    image: ubuntu/bind9:latest
    container_name: bind9
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    volumes:
      - ./config:/etc/bind
      - ./cache:/var/cache/bind
      - ./records:/var/lib/bind
    environment:
      - TZ=UTC

  bind_exporter:
    image: prometheus/bind_exporter:latest
    container_name: bind_exporter
    restart: unless-stopped
    ports:
      - "9119:9119"
    command:
      - "--bind.pid-file=/var/run/named/named.pid"
      - "--bind.timeout=20s"
      - "--web.listen-address=:9119"
      - "--bind.stats-url=http://bind9:8053/json/v1/server"
    depends_on:
      - bind9
